<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus Swarm | Agentic AI Incubator</title>
    <style>
        :root {
            --bg-deep: #050508;
            --card-bg: #11111a;
            --accent-primary: #00f2ff;
            --accent-secondary: #7000ff;
            --text-main: #e0e0e0;
            --text-dim: #888899;
            --success: #00ff88;
            --warning: #ffaa00;
            --danger: #ff4444;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            overflow: hidden;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }

        #app-container {
            width: min(95vw, 1200px);
            height: min(92vh, 1000px);
            background: var(--card-bg);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            border: 1px solid var(--border);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 0 0 20px rgba(0, 242, 255, 0.05);
        }

        header {
            padding: clamp(1rem, 3vw, 1.5rem);
            background: linear-gradient(to bottom, rgba(0, 242, 255, 0.05), transparent);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            font-size: 1.8rem;
            filter: drop-shadow(0 0 8px var(--accent-primary));
        }

        .logo-text {
            font-weight: 800;
            letter-spacing: 1px;
            font-size: clamp(1.2rem, 4vw, 1.5rem);
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .global-stats {
            display: flex;
            gap: 10px;
            font-size: 0.8rem;
        }

        .stat-pill {
            background: var(--glass);
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 5px;
            white-space: nowrap;
        }

        main {
            flex: 1;
            overflow-y: auto;
            padding: clamp(1rem, 4vw, 2rem);
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            scrollbar-width: thin;
            scrollbar-color: var(--accent-secondary) transparent;
            align-content: start;
        }

        main::-webkit-scrollbar {
            width: 4px;
        }

        main::-webkit-scrollbar-thumb {
            background: var(--accent-secondary);
            border-radius: 10px;
        }

        .venture-card {
            background: var(--glass);
            border-radius: 18px;
            padding: 20px;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 15px;
            height: fit-content;
        }

        .venture-card:hover {
            border-color: var(--accent-primary);
            background: rgba(255, 255, 255, 0.08);
        }

        .venture-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .venture-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--accent-primary);
            margin-bottom: 4px;
        }

        .venture-status {
            font-size: 0.65rem;
            text-transform: uppercase;
            padding: 3px 8px;
            border-radius: 4px;
            background: var(--success);
            color: black;
            font-weight: bold;
        }

        .swarm-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin: 5px 0;
        }

        .agent-node {
            aspect-ratio: 1;
            background: var(--bg-deep);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            border: 1px solid var(--border);
            position: relative;
        }

        .agent-node.active::after {
            content: '';
            position: absolute;
            width: 5px;
            height: 5px;
            background: var(--success);
            border-radius: 50%;
            top: 4px;
            right: 4px;
            box-shadow: 0 0 5px var(--success);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        .progress-bar {
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
            width: 0%;
            transition: width 0.5s ease;
        }

        .action-bar {
            padding: 15px 20px;
            background: var(--glass);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 12px;
            flex-shrink: 0;
        }

        .btn {
            padding: 12px 20px;
            border-radius: 12px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
            font-size: 0.85rem;
            flex: 1;
        }

        .btn-primary {
            background: var(--accent-primary);
            color: var(--bg-deep);
        }

        .btn-primary:active {
            transform: scale(0.97);
            filter: brightness(1.1);
        }

        .btn-secondary {
            background: var(--glass);
            color: white;
            border: 1px solid var(--border);
        }

        .modal-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(12px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 20px;
        }

        .modal-content {
            background: var(--card-bg);
            width: min(100%, 450px);
            max-height: 90vh;
            border-radius: 24px;
            padding: 25px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .input-group label {
            font-size: 0.75rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input, textarea, select {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 10px;
            color: white;
            font-family: inherit;
            outline: none;
            font-size: 0.9rem;
        }

        input:focus, textarea:focus, select:focus {
            border-color: var(--accent-primary);
            background: rgba(255, 255, 255, 0.08);
        }

        .template-section {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .template-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .chip {
            padding: 6px 12px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 15px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .chip:hover {
            border-color: var(--accent-primary);
            color: var(--accent-primary);
        }

        .time-picker-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
        }

        .task-log {
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.7rem;
            background: rgba(0, 0, 0, 0.4);
            padding: 10px;
            border-radius: 8px;
            height: 90px;
            overflow-y: auto;
            color: var(--success);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .log-entry {
            margin-bottom: 4px;
            line-height: 1.2;
        }

        .log-entry span {
            color: var(--accent-primary);
        }

        @media (max-width: 480px) {
            #app-container {
                width: 100vw;
                height: 100vh;
                border-radius: 0;
            }
            .global-stats {
                display: none;
            }
            .modal-content {
                padding: 20px;
            }
        }
    </style>
</head>
<body>

    <div id="app-container">
        <header>
            <div class="logo-area">
                <span class="logo-icon">💠</span>
                <div class="logo-text">NEXUS SWARM</div>
            </div>
            <div class="global-stats">
                <div class="stat-pill"><span>🤖</span> <span id="total-agents">0</span></div>
                <div class="stat-pill"><span>💎</span> <span id="total-revenue">$0</span></div>
            </div>
        </header>

        <main id="venture-list">
            <div id="empty-state" style="grid-column: 1/-1; text-align: center; padding: 60px 20px; color: var(--text-dim);">
                <div style="font-size: 3.5rem; margin-bottom: 20px;">🛸</div>
                <h3 style="color: white;">No Active Swarms</h3>
                <p>Initialize your first autonomous venture to begin the expansion protocol.</p>
            </div>
        </main>

        <div class="action-bar">
            <button class="btn btn-primary" onclick="openModal()">
                <span>➕</span> DEPLOY SWARM
            </button>
            <button class="btn btn-secondary" onclick="resetAll()" style="flex: 0 0 auto; width: 50px; padding: 0;">
                <span>🧹</span>
            </button>
        </div>

        <!-- Modal for New Venture -->
        <div id="modal" class="modal-overlay">
            <div class="modal-content">
                <h2 style="margin: 0; color: var(--accent-primary); font-size: 1.4rem;">Initialize Swarm</h2>
                
                <div class="template-section">
                    <label style="font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase;">Idea Templates</label>
                    <div class="template-chips">
                        <div class="chip" onclick="applyTemplate(0)">DeFi Arb</div>
                        <div class="chip" onclick="applyTemplate(1)">SEO Engine</div>
                        <div class="chip" onclick="applyTemplate(2)">Trend Hunter</div>
                        <div class="chip" onclick="applyTemplate(3)">Auto-Dev</div>
                    </div>
                </div>

                <div class="input-group">
                    <label>Venture Name</label>
                    <input type="text" id="v-name" placeholder="e.g. Quantum Logistics AI">
                </div>
                <div class="input-group">
                    <label>Core Objective</label>
                    <textarea id="v-goal" rows="2" placeholder="Describe the mission..."></textarea>
                </div>
                <div class="input-group">
                    <label>Autonomous Budget</label>
                    <input type="number" id="v-budget" value="5000">
                </div>
                <div class="input-group">
                    <label>Deployment Time (12h)</label>
                    <input type="text" id="v-time" placeholder="Click to set time" readonly onclick="showTimePicker(this)">
                </div>
                
                <div style="display: flex; gap: 10px; margin-top: 10px;">
                    <button class="btn btn-primary" style="flex: 2;" onclick="deployVenture()">CONFIRM DEPLOYMENT</button>
                    <button class="btn btn-secondary" style="flex: 1;" onclick="closeModal()">CANCEL</button>
                </div>
            </div>
        </div>

        <!-- Custom Time Picker Modal -->
        <div id="timePickerModal" class="modal-overlay" style="z-index: 110;">
            <div class="modal-content" style="width: 320px;">
                <h3 style="margin: 0 0 15px 0; font-size: 1.1rem;">Select Time</h3>
                <div class="time-picker-grid">
                    <div class="input-group">
                        <label>Hour</label>
                        <select id="tp-hour"></select>
                    </div>
                    <div class="input-group">
                        <label>Min</label>
                        <select id="tp-min"></select>
                    </div>
                    <div class="input-group">
                        <label>Period</label>
                        <select id="tp-period">
                            <option value="AM">AM</option>
                            <option value="PM">PM</option>
                        </select>
                    </div>
                </div>
                <button class="btn btn-primary" style="margin-top: 15px; width: 100%;" onclick="confirmTime()">SET TIME</button>
            </div>
        </div>
    </div>

    <script>
        const APP_STORAGE_KEY_V2 = 'NEXUS_SWARM_V2';
        const APP_STORAGE_KEY = 'NEXUS_SWARM_V3';
        let ventures = [];
        let globalRevenue = 0;

        const templates = [
            { name: "Neural Arbitrage", goal: "Scan cross-chain liquidity pools for 0.1% price discrepancies and execute flash loans." },
            { name: "GhostWriter Pro", goal: "Generate high-converting ad copy for 500+ niche subreddits using sentiment analysis." },
            { name: "Eco-Sentry AI", goal: "Monitor satellite imagery for illegal deforestation and auto-file reports to local authorities." },
            { name: "Auto-Dev Swarm", goal: "Autonomous bug bounty hunting and automated PR generation for open source repos." }
        ];

        function createVenture({ name, objective, budget, owner = 'local-user', deploymentTime }) {
            const id = typeof crypto !== 'undefined' && typeof crypto.randomUUID === 'function'
                ? crypto.randomUUID()
                : Date.now().toString();

            return {
                metadata: {
                    id,
                    schemaVersion: 3,
                    name,
                    objective,
                    owner,
                    createdAt: new Date().toISOString(),
                    deploymentTime
                },
                status: {
                    phase: 'Initializing',
                    progress: 0,
                    updatedAt: new Date().toISOString()
                },
                budget: {
                    allocated: parseFloat(budget) || 0,
                    currency: 'USD',
                    spent: 0
                },
                swarm: {
                    agents: [
                        { role: 'CEO', icon: '👔', active: true },
                        { role: 'CTO', icon: '💻', active: true },
                        { role: 'CMO', icon: '📣', active: false },
                        { role: 'CFO', icon: '⚖️', active: false }
                    ]
                },
                memory: {
                    shortTerm: [`[SYSTEM] Swarm protocol initiated at ${deploymentTime}...`],
                    longTerm: []
                },
                analytics: {
                    revenue: 0,
                    eventsProcessed: 0
                }
            };
        }

        function migrateV2Venture(v = {}) {
            if(v && v.metadata && v.status && v.swarm && v.memory && v.analytics) {
                return v;
            }

            const id = v.id ? v.id.toString() : (typeof crypto !== 'undefined' && typeof crypto.randomUUID === 'function' ? crypto.randomUUID() : Date.now().toString());
            return {
                metadata: {
                    id,
                    schemaVersion: 3,
                    name: v.name || 'Untitled Venture',
                    objective: v.goal || '',
                    owner: v.owner || 'local-user',
                    createdAt: v.createdAt || new Date().toISOString(),
                    deploymentTime: v.time || v.deploymentTime || ''
                },
                status: {
                    phase: v.status || 'Initializing',
                    progress: Number(v.progress) || 0,
                    updatedAt: v.updatedAt || new Date().toISOString()
                },
                budget: {
                    allocated: parseFloat(v.budget) || 0,
                    currency: v.currency || 'USD',
                    spent: parseFloat(v.spent) || 0
                },
                swarm: {
                    agents: Array.isArray(v.agents) ? v.agents : []
                },
                memory: {
                    shortTerm: Array.isArray(v.logs) ? v.logs : [],
                    longTerm: []
                },
                analytics: {
                    revenue: parseFloat(v.revenue) || 0,
                    eventsProcessed: Number(v.eventsProcessed) || 0
                }
            };
        }


        document.body.addEventListener('dblclick', function(event) {
            event.preventDefault();
        });

        window.addEventListener('load', () => {
            loadData();
            populateTimeOptions();
            startGlobalSimulation();
        });

        function populateTimeOptions() {
            const hSelect = document.getElementById('tp-hour');
            const mSelect = document.getElementById('tp-min');
            
            // 12-hour format
            for(let i=1; i<=12; i++) {
                let opt = document.createElement('option');
                opt.value = i.toString().padStart(2, '0');
                opt.textContent = i.toString().padStart(2, '0');
                hSelect.appendChild(opt);
            }
            
            for(let i=0; i<60; i+=5) {
                let opt = document.createElement('option');
                opt.value = i.toString().padStart(2, '0');
                opt.textContent = i.toString().padStart(2, '0');
                mSelect.appendChild(opt);
            }
        }

        function applyTemplate(index) {
            const t = templates[index];
            document.getElementById('v-name').value = t.name;
            document.getElementById('v-goal').value = t.goal;
        }

        function showTimePicker(input) {
            input.blur();
            document.getElementById('timePickerModal').style.display = 'flex';
            document.getElementById('timePickerModal').dataset.target = input.id;
        }

        function confirmTime() {
            const h = document.getElementById('tp-hour').value;
            const m = document.getElementById('tp-min').value;
            const p = document.getElementById('tp-period').value;
            const targetId = document.getElementById('timePickerModal').dataset.target;
            document.getElementById(targetId).value = `${h}:${m} ${p}`;
            document.getElementById('timePickerModal').style.display = 'none';
        }

        function openModal() {
            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        function deployVenture() {
            const name = document.getElementById('v-name').value.trim();
            const goal = document.getElementById('v-goal').value.trim();
            const budget = document.getElementById('v-budget').value;
            const time = document.getElementById('v-time').value;

            if(!name || !goal || !time) {
                alert("Please complete all deployment parameters.");
                return;
            }

            const newVenture = createVenture({ name, objective: goal, budget, deploymentTime: time });

            ventures.push(newVenture);
            saveData();
            renderVentures();
            closeModal();
            
            // Reset form
            document.getElementById('v-name').value = '';
            document.getElementById('v-goal').value = '';
            document.getElementById('v-time').value = '';
        }

        function renderVentures() {
            const container = document.getElementById('venture-list');
            const empty = document.getElementById('empty-state');
            
            if(ventures.length === 0) {
                empty.style.display = 'block';
                container.innerHTML = '';
                container.appendChild(empty);
                updateGlobalStats();
                return;
            }

            empty.style.display = 'none';
            
            container.innerHTML = '';
            ventures.forEach(v => {
                const card = document.createElement('div');
                card.className = 'venture-card';
                
                const activeAgents = v.swarm.agents.filter(a => a.active).length;
                
                card.innerHTML = `
                    <div class="venture-header">
                        <div>
                            <div class="venture-title">${v.metadata.name}</div>
                            <div style="font-size: 0.7rem; color: var(--text-dim); max-width: 250px; line-height: 1.3;">${v.metadata.objective}</div>
                        </div>
                        <div class="venture-status">${v.status.phase}</div>
                    </div>
                    <div style="font-size: 0.8rem; color: var(--text-dim);">
                        💰 $${parseFloat(v.analytics.revenue).toFixed(2)} | ⏰ ${v.metadata.deploymentTime}
                    </div>
                    <div class="swarm-grid">
                        ${v.swarm.agents.map(a => `
                            <div class="agent-node ${a.active ? 'active' : ''}" title="${a.role}">
                                ${a.icon}
                            </div>
                        `).join('')}
                    </div>
                    <div>
                        <div style="font-size: 0.65rem; color: var(--text-dim); margin-bottom: 4px;">PROGRESS: ${Math.round(v.status.progress)}%</div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${v.status.progress}%;"></div>
                        </div>
                    </div>
                    <div class="task-log">
                        ${v.memory.shortTerm.slice(-4).map((log, idx) => `
                            <div class="log-entry"><span>[${idx}]</span> ${log}</div>
                        `).join('')}
                    </div>
                `;
                
                container.appendChild(card);
            });
            
            updateGlobalStats();
        }

        function updateGlobalStats() {
            const totalAgents = ventures.reduce((sum, v) => sum + v.swarm.agents.filter(a => a.active).length, 0);
            globalRevenue = ventures.reduce((sum, v) => sum + parseFloat(v.analytics.revenue), 0);
            
            document.getElementById('total-agents').textContent = totalAgents;
            document.getElementById('total-revenue').textContent = '$' + globalRevenue.toFixed(0);
        }

        function startGlobalSimulation() {
            setInterval(() => {
                ventures.forEach(v => {
                    // Simulate progress
                    if(v.status.progress < 100) {
                        v.status.progress += Math.random() * 5;
                        if(v.status.progress > 100) v.status.progress = 100;
                    }
                    
                    // Simulate agent activation
                    if(Math.random() > 0.7 && v.swarm.agents.length > 0) {
                        const randomAgent = v.swarm.agents[Math.floor(Math.random() * v.swarm.agents.length)];
                        randomAgent.active = !randomAgent.active;
                    }
                    
                    // Simulate revenue
                    v.analytics.revenue += Math.random() * 100;
                    v.analytics.eventsProcessed += 1;
                    v.status.updatedAt = new Date().toISOString();
                    
                    // Add log entry
                    const logMessages = [
                        `Neural weights optimized +${(Math.random() * 0.5).toFixed(2)}%`,
                        `Arbitrage opportunity detected: ${(Math.random() * 10).toFixed(2)}bps`,
                        `Task batch processed: ${Math.floor(Math.random() * 500)} operations`,
                        `Market volatility scan complete`,
                        `Cache memory defragmented`,
                        `Swarm consensus reached`
                    ];
                    
                    v.memory.shortTerm.push(`[AUTO] ${logMessages[Math.floor(Math.random() * logMessages.length)]}`);
                    if(v.memory.shortTerm.length > 20) v.memory.shortTerm.shift();
                });
                
                saveData();
                renderVentures();
            }, 3000);
        }

        function saveData() {
            localStorage.setItem(APP_STORAGE_KEY, JSON.stringify({ ventures, globalRevenue }));
        }

        function loadData() {
            const savedV3 = localStorage.getItem(APP_STORAGE_KEY);
            const savedV2 = localStorage.getItem(APP_STORAGE_KEY_V2);
            const saved = savedV3 || savedV2;

            if(saved) {
                try {
                    const data = JSON.parse(saved);
                    ventures = (data.ventures || []).map(migrateV2Venture);
                    globalRevenue = data.globalRevenue || ventures.reduce((sum, v) => sum + parseFloat(v.analytics.revenue), 0);

                    if(!savedV3 && savedV2) {
                        saveData();
                    }
                } catch(e) {
                    console.error('Failed to load data', e);
                }
            }
            renderVentures();
        }

        function resetAll() {
            if(confirm('Reset all swarms?')) {
                ventures = [];
                globalRevenue = 0;
                saveData();
                renderVentures();
            }
        }
    </script>
</body>
</html>
